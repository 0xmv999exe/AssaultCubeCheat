name: Build and Release

on:
  push:
    branches: [ "main" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v3

    - name: Configure CMake
      run: cmake -B ${{github.workspace}}/build -DCMAKE_BUILD_TYPE=Release -A Win32

    - name: Build
      run: cmake --build ${{github.workspace}}/build --config Release

    - name: Upload Artifacts (Actions Tab)
      uses: actions/upload-artifact@v4
      with:
        name: ACCheat-Build
        path: |
          ${{github.workspace}}/build/Release/ACCheat.dll
          ${{github.workspace}}/build/Release/Injector.exe

    - name: Create Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v1
      with:
        files: |
          build/Release/ACCheat.dll
          build/Release/Injector.exe
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
